name: Update osu! rankings data

on:
  schedule:
    - cron: '0 * * * *'   # every hour, on the hour (UTC)
  workflow_dispatch: {}    # adds a "Run workflow" button under the Actions tab

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Fetch latest rankings
        env:
          OSU_CLIENT_ID: ${{ secrets.OSU_CLIENT_ID }}
          OSU_CLIENT_SECRET: ${{ secrets.OSU_CLIENT_SECRET }}
        run: python scripts/fetch_data.py

      - name: Commit and push if data changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/history.json
          git diff --staged --quiet || git commit -m "Update rankings data $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push
